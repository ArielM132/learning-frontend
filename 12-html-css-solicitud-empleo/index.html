<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Teacher Conference Form</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
 <div class="container">
  <header>
    <h1>Solicitud de Empleo</h1>
    <p>Únete a nuestro equipo creativo</p>
  </header>

  <form>
    <div class="input-group">
      <label for="name">Nombre Completo</label>
      <input type="text" id="name" placeholder="Ej. Ariel Moreno" required>
    </div>

    <div class="input-group">
      <label for="email">Correo Electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required>
    </div>

    <div class="input-group">
      <label for="position">Puesto al que postula</label>
      <select id="position" required>
        <option value="">Selecciona una opción...</option>
        <option value="frontend">Desarrollador Frontend</option>
        <option value="backend">Desarrollador Backend</option>
        <option value="fullstack">Full Stack Developer</option>
      </select>
    </div>

    <fieldset class="radio-group">
      <legend>Disponibilidad Horaria</legend>
      <div class="radio-options">
        <div class="radio-item">
          <input type="radio" id="full-time" name="availability" value="full-time" required>
          <label for="full-time">Tiempo Completo</label>
        </div>
        <div class="radio-item">
          <input type="radio" id="part-time" name="availability" value="part-time">
          <label for="part-time">Tiempo Parcial</label>
        </div>
      </div>
    </fieldset>

    <div class="input-group">
      <label for="message">Cuéntanos sobre ti</label>
      <textarea id="message" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
    </div>

    <button type="submit">Enviar Postulación</button>
  </form>
</div>
      </body>
</html>
